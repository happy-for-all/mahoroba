name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  # 手動実行ボタンも使えるように追加
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # build.py は標準ライブラリのみ使用のため pip install は省略（最速化）
      - name: build.py を実行
        run: python build.py

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Wrangler をインストール
        run: npm install -g wrangler

      - name: Cloudflare Workers へデプロイ
        env:
          # GH リポジトリの Settings → Secrets → CLOUDFLARE_API_TOKEN に登録済みであること
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy

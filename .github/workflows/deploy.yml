name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
  # 毎日JST 06:13 に自動実行（UTC 21:13）
  schedule:
    - cron: '13 21 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # fetch_articles.py が requests を使用するためインストール
      - name: Python ライブラリをインストール
        run: pip install requests

      # 攻略情報を収集して articles.json を生成
      # ★ 失敗してもデプロイを止めない（continue-on-error: true）
      - name: 攻略情報を収集
        run: python fetch_articles.py
        continue-on-error: true

      # dist/ フォルダを生成
      - name: build.py を実行
        run: python build.py

      # ★ dist/ が存在するか確認（デバッグ用・問題発生時に原因がすぐわかる）
      - name: dist/ の存在確認
        run: |
          echo "=== dist/ の内容 ==="
          ls -la dist/
          echo "=== 確認完了 ==="

      - name: Node.js 22 をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Wrangler をインストール
        run: npm install -g wrangler

      - name: Cloudflare Workers へデプロイ
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: wrangler deploy
